name: "Deploy"

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENCE
      - .gitignore

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmmirror.com
      - run: npm install -g yarn

      - name: yarn install 
        run: yarn install

      - name: yarn build
        run: yarn generate

      - name: clean old files
        run: rm -rf /opt/1panel/apps/openresty/openresty/www/sites/zayn_blog/index/*

      - name: move new files to website directory
        run: mv ./.output/public/* /opt/1panel/apps/openresty/openresty/www/sites/zayn_blog/index/

